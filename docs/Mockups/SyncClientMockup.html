  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

: 0, steps: 0, ringOffset: 264, tutorialExpanded: false, legendExpanded: false, billingCycle: 'lifetime' };\n\n  componentDidMount() {\n    const initial = this.props.initialScreen || 'dashboard';\n    this.setState({ screen: initial });\n\n    const target = (this.props.pathwayProgress ?? 41) / 100;\n    const totalSteps = 44;\n    const stepsTarget = Math.round(target * totalSteps);\n    const circumference = 264;\n\n    setTimeout(() => {\n      this.setState({ ringOffset: circumference - circumference * target });\n    }, 150);\n\n    this._animateCount('pct', Math.round(target * 100), 1300);\n    this._animateCount('steps', stepsTarget, 1300);\n  }\n\n  _animateCount(key, target, duration) {\n    const start = performance.now();\n    const tick = (now) => {\n      const p = Math.min(1, (now - start) / duration);\n      const eased = 1 - Math.pow(1 - p, 4);\n      this.setState({ [key]: Math.round(eased * target) });\n      if (p < 1) requestAnimationFrame(tick);\n    };\n    requestAnimationFrame(tick);\n  }\n\n  goTo(id) {\n    this.setState({ screen: id });\n  }\n\n  toggleTutorial() {\n    this.setState((s) => ({ tutorialExpanded: !s.tutorialExpanded }));\n  }\n\n  toggleLegend() {\n    this.setState((s) => ({ legendExpanded: !s.legendExpanded }));\n  }\n\n  setBilling(cycle) {\n    this.setState({ billingCycle: cycle });\n  }\n\n  jumpTo(id) {\n    const container = document.querySelector('[data-no-scrollbar]');\n    const el = document.getElementById(id);\n    if (container && el) {\n      const targetTop = el.getBoundingClientRect().top - container.getBoundingClientRect().top + container.scrollTop - 16;\n      container.scrollTo({ top: targetTop, behavior: 'smooth' });\n    }\n  }\n\n  renderVals() {\n    const screen = this.state.screen || this.props.initialScreen || 'dashboard';\n    const titles = { dashboard: 'Dashboard', pathway: 'Pathway', products: 'Products', achievements: 'Achievements', more: 'More', support: 'Support', upgrade: 'Upgrade' };\n    const palette = this.props.accentPalette || ['#e8d9b0', '#cba25a', '#9c7233'];\n    const [pale, mid, deep] = palette;\n    const mutedDeep = 'oklch(50% 0.018 85)';\n    const dark = 'oklch(18% 0.02 85)';\n\n    const goldGradient135 = `linear-gradient(135deg, ${pale}, ${mid} 60%, ${deep})`;\n    const goldGradient140 = `linear-gradient(140deg, ${pale}, ${deep})`;\n\n    const disp = (id) => ({ display: screen === id ? 'block' : 'none', animation: 'enter .38s cubic-bezier(.22,1,.36,1)' });\n\n    const tutorialData = [\n      { label: 'Dashboard', desc: \"Your home base — progress, today's focus and stats at a glance.\", state: 'done' },\n      { label: 'Pathway', desc: 'The step-by-step guide to setting up and growing your store.', state: 'done' },\n      { label: 'Products', desc: 'The stock in your store — order items here when you make a sale.', state: 'current' },\n      { label: 'Checkout', desc: \"Pay for the items you're shipping and track every order.\", state: 'upcoming' },\n      { label: 'Achievements', desc: 'Milestones for your store — earn them by submitting proof.', state: 'upcoming' },\n      { label: 'Support', desc: 'Stuck on anything? Open a ticket and the team will help.', state: 'upcoming' },\n      { label: 'Upgrade', desc: \"Compare tiers and unlock more product slots when you're ready.\", state: 'upcoming' },\n    ];\n    const doneDot = { width: '8px', height: '8px', borderRadius: '50%', background: 'oklch(58% 0.10 68)', flexShrink: 0, marginTop: '4px' };\n    const upcomingDot = { width: '8px', height: '8px', borderRadius: '50%', background: 'transparent', border: '1.5px solid oklch(50% 0.018 85 / .6)', flexShrink: 0, marginTop: '4px' };\n    const tutorialOtherItems = tutorialData.filter((t) => t.state !== 'current').map((t) => ({\n      label: t.label,\n      desc: t.desc,\n      dotStyle: t.state === 'done' ? doneDot : upcomingDot,\n      labelStyle: { fontSize: '10px', letterSpacing: '.08em', textTransform: 'uppercase', marginRight: '6px', color: t.state === 'done' ? 'oklch(58% 0.10 68)' : 'oklch(58% 0.10 68 / .7)' },\n      descStyle: { fontSize: '11.5px', color: t.state === 'done' ? 'oklch(80% 0.02 85)' : 'oklch(50% 0.018 85)' },\n    }));\n    const tutorialDoneCount = tutorialData.filter((t) => t.state === 'done').length;\n    const navBtn = (id) => {\n      const active = screen === id || (id === 'more' && (screen === 'support' || screen === 'upgrade'));\n      return {\n        flex: 1, display: 'flex', flexDirection: 'column', alignItems: 'center', gap: '4px',\n        padding: '9px 4px', borderRadius: '14px', border: 'none', cursor: 'pointer',\n        background: active ? goldGradient135 : 'transparent',\n        color: active ? dark : mutedDeep,\n        boxShadow: active ? `0 6px 14px -6px ${pale}66` : 'none',\n      };\n    };\n\n    const gold = pale;\n\n    const billingCycle = this.state.billingCycle;\n    const tabStyle = (id) => ({\n      flex: 1, textAlign: 'center', padding: '9px', borderRadius: '100px', border: 'none', cursor: 'pointer',\n      fontSize: '10.5px', letterSpacing: '.08em', fontWeight: 600, textTransform: 'uppercase',\n      background: billingCycle === id ? goldGradient135 : 'transparent',\n      color: billingCycle === id ? dark : mutedDeep,\n    });\n\n    const currentTier = this.props.upgradeTier || 'vip';\n    const tierRank = { none: 0, pro: 1, elite: 2, vip: 3 };\n    const tiersRaw = [\n      { key: 'pro', rank: 1, title: 'Pro Accelerator', lifetime: 189, monthly: 19 },\n      { key: 'elite', rank: 2, title: 'Elite Scale', lifetime: 397, monthly: 39 },\n      { key: 'vip', rank: 3, title: 'VIP Inner Circle', lifetime: 739, monthly: 69 },\n    ];\n    const cardBase = { background: 'linear-gradient(165deg, oklch(23.5% 0.018 85), oklch(19% 0.016 85))', borderRadius: '18px', boxShadow: '0 1px 0 oklch(100% 0 0 / .03) inset, 0 14px 30px -18px rgba(0,0,0,.65)', border: '1px solid oklch(38% 0.02 85 / .18)', padding: '20px' };\n    const cardCurrent = { ...cardBase, border: `1px solid ${gold}80`, boxShadow: '0 1px 0 oklch(100% 0 0 / .03) inset, 0 14px 30px -18px rgba(0,0,0,.65), 0 0 0 1px oklch(78% 0.13 86 / .15)' };\n    const badgeGold = { fontSize: '10px', fontWeight: 600, letterSpacing: '.06em', padding: '4px 10px', borderRadius: '6px', background: goldGradient135, color: dark, display: 'inline-block' };\n    const badgeMuted = { fontSize: '10px', fontWeight: 600, letterSpacing: '.06em', padding: '4px 10px', borderRadius: '6px', background: 'transparent', color: mutedDeep, border: '1px solid oklch(32% 0.02 85 / 0.55)', display: 'inline-block' };\n\n    const tiers = tiersRaw.map((t) => {\n      const included = tierRank[currentTier] >= t.rank;\n      const isCurrent = tierRank[currentTier] === t.rank;\n      return {\n        title: t.title,\n        badgeLabel: t.key.toUpperCase(),\n        badgeStyle: t.key === 'vip' ? badgeGold : badgeMuted,\n        price: billingCycle === 'lifetime' ? `$${t.lifetime}` : `$${t.monthly}`,\n        priceSuffix: billingCycle === 'lifetime' ? 'once' : '/ month',\n        included,\n        notIncluded: !included,\n        actionLabel: `Upgrade to ${t.key.charAt(0).toUpperCase() + t.key.slice(1)}`,\n        cardStyle: isCurrent ? cardCurrent : cardBase,\n      };\n    });\n    const upgradeSubtitle = currentTier === 'none'\n      ? 'Compare tiers and unlock more product slots, tools and support.'\n      : `You're on ${tiersRaw.find((t) => t.key === currentTier) ? tiersRaw.find((t) => t.key === currentTier).title : 'a paid tier'}. Lifetime upgrades are prorated — you only pay the difference.`;\n\n    const isSecondaryScreen = screen === 'support' || screen === 'upgrade';\n\n    return {\n      goDashboard: () => this.goTo('dashboard'),\n      goPathway: () => this.goTo('pathway'),\n      goProducts: () => this.goTo('products'),\n      goAchievements: () => this.goTo('achievements'),\n      goMore: () => this.goTo('more'),\n      goSupport: () => this.goTo('support'),\n      goUpgrade: () => this.goTo('upgrade'),\n\n      isSecondaryScreen,\n      isMainScreen: !isSecondaryScreen,\n      screenLabelUpper: titles[screen] ? titles[screen].toUpperCase() : '',\n\n      supportStyle: disp('support'),\n      upgradeStyle: disp('upgrade'),\n      upgradeSubtitle,\n      lifetimeTabStyle: tabStyle('lifetime'),\n      monthlyTabStyle: tabStyle('monthly'),\n      setLifetime: () => this.setBilling('lifetime'),\n      setMonthly: () => this.setBilling('monthly'),\n      tiers,\n\n      screenTitle: titles[screen],\n      pctNum: this.state.pct,\n      stepsNum: this.state.steps,\n      ringOffset: this.state.ringOffset,\n\n      dashboardStyle: disp('dashboard'),\n      pathwayStyle: disp('pathway'),\n      productsStyle: disp('products'),\n      achievementsStyle: disp('achievements'),\n      moreStyle: disp('more'),\n\n      navDashboardStyle: navBtn('dashboard'),\n      navPathwayStyle: navBtn('pathway'),\n      navProductsStyle: navBtn('products'),\n      navAchievementsStyle: navBtn('achievements'),\n      navMoreStyle: navBtn('more'),\n\n      accentPale: pale,\n      accentDeep: deep,\n\n      tutorialExpanded: this.state.tutorialExpanded,\n      toggleTutorial: () => this.toggleTutorial(),\n      tutorialToggleLabel: this.state.tutorialExpanded ? 'Hide all steps ▴' : 'Show all steps ▾',\n      tutorialProgress: `${tutorialDoneCount} of ${tutorialData.length} complete`,\n      tutorialOtherItems: tutorialOtherItems,\n\n      jumpLaunch: () => this.jumpTo('hub-launch'),\n      jumpProducts: () => this.jumpTo('hub-products'),\n      jumpTraffic: () => this.jumpTo('hub-traffic'),\n      jumpSell: () => this.jumpTo('hub-sell'),\n      jumpScale: () => this.jumpTo('hub-scale'),\n      jumpElevate: () => this.jumpTo('hub-elevate'),\n\n      legendExpanded: this.state.legendExpanded,\n      toggleLegend: () => this.toggleLegend(),\n      legendLabel: 'Groups',\n      legendArrowStyle: { transform: this.state.legendExpanded ? 'rotate(90deg)' : 'rotate(0deg)', transition: 'transform .2s ease' },\n\n      vipPillStyle: { fontSize: '10px', letterSpacing: '.12em', fontWeight: 600, color: dark, background: goldGradient135, padding: '6px 12px', borderRadius: '100px', boxShadow: `0 2px 10px ${pale}66` },\n      focusIconStyle: { width: '42px', height: '42px', borderRadius: '12px', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', background: goldGradient140, color: dark, boxShadow: '0 6px 16px oklch(70% 0.12 82 / .35)' },\n      primaryBtnStyle: { width: '100%', textAlign: 'center', padding: '13px', borderRadius: '12px', fontSize: '12px', letterSpacing: '.08em', fontWeight: 600, background: goldGradient135, color: dark, boxShadow: '0 10px 24px -8px oklch(78% 0.13 86 / .45)', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: '6px' },\n      chipActiveStyle: { flexShrink: 0, fontSize: '10.5px', letterSpacing: '.04em', padding: '8px 13px', borderRadius: '100px', background: goldGradient135, color: dark, fontWeight: 600, border: '1px solid transparent', whiteSpace: 'nowrap' },\n      achActiveIconStyle: { width: '44px', height: '44px', borderRadius: '12px', flexShrink: 0, display: 'flex', alignItems: 'center', justifyContent: 'center', background: goldGradient140, color: dark, boxShadow: '0 6px 16px oklch(70% 0.12 82 / .35)' },\n      achGoldBtnStyle: { display: 'inline-flex', alignItems: 'center', gap: '6px', fontSize: '10.5px', letterSpacing: '.06em', fontWeight: 600, padding: '9px 15px', borderRadius: '100px', background: goldGradient135, color: dark },\n    };\n  }\n}\n\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
